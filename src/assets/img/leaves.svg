<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" fill="#000">
  <!-- Thin bamboo/grass-like leaf clusters -->
  <!-- Branch 1 - top right -->
  <g transform="translate(580,80) rotate(-25)">
    <ellipse cx="0" cy="-40" rx="3" ry="38"/>
    <ellipse cx="12" cy="-55" rx="2.5" ry="32" transform="rotate(15)"/>
    <ellipse cx="-10" cy="-35" rx="2.5" ry="30" transform="rotate(-12)"/>
    <ellipse cx="8" cy="-20" rx="2" ry="28" transform="rotate(8)"/>
    <ellipse cx="-15" cy="-50" rx="2" ry="25" transform="rotate(-20)"/>
    <line x1="0" y1="0" x2="0" y2="-60" stroke="#000" stroke-width="1.5"/>
  </g>
  <!-- Branch 2 - right side -->
  <g transform="translate(700,200) rotate(-40)">
    <ellipse cx="0" cy="-45" rx="3" ry="42"/>
    <ellipse cx="14" cy="-30" rx="2.5" ry="35" transform="rotate(18)"/>
    <ellipse cx="-12" cy="-40" rx="2.5" ry="28" transform="rotate(-15)"/>
    <ellipse cx="6" cy="-55" rx="2" ry="30" transform="rotate(10)"/>
    <ellipse cx="-8" cy="-25" rx="2" ry="24" transform="rotate(-8)"/>
    <ellipse cx="18" cy="-50" rx="2" ry="22" transform="rotate(25)"/>
    <line x1="0" y1="0" x2="0" y2="-65" stroke="#000" stroke-width="1.5"/>
  </g>
  <!-- Branch 3 - center right -->
  <g transform="translate(620,350) rotate(-15)">
    <ellipse cx="0" cy="-50" rx="3.5" ry="45"/>
    <ellipse cx="15" cy="-35" rx="2.5" ry="36" transform="rotate(20)"/>
    <ellipse cx="-14" cy="-45" rx="2.5" ry="32" transform="rotate(-18)"/>
    <ellipse cx="10" cy="-60" rx="2" ry="28" transform="rotate(12)"/>
    <ellipse cx="-8" cy="-30" rx="2" ry="26" transform="rotate(-10)"/>
    <line x1="0" y1="10" x2="0" y2="-70" stroke="#000" stroke-width="1.5"/>
  </g>
  <!-- Branch 4 - lower right -->
  <g transform="translate(720,480) rotate(-50)">
    <ellipse cx="0" cy="-38" rx="3" ry="35"/>
    <ellipse cx="12" cy="-50" rx="2.5" ry="30" transform="rotate(14)"/>
    <ellipse cx="-10" cy="-30" rx="2" ry="28" transform="rotate(-16)"/>
    <ellipse cx="16" cy="-35" rx="2" ry="24" transform="rotate(22)"/>
    <ellipse cx="-14" cy="-48" rx="2" ry="22" transform="rotate(-22)"/>
    <line x1="0" y1="5" x2="0" y2="-58" stroke="#000" stroke-width="1.5"/>
  </g>
  <!-- Branch 5 - bottom center-right -->
  <g transform="translate(500,550) rotate(-10)">
    <ellipse cx="0" cy="-42" rx="3" ry="40"/>
    <ellipse cx="13" cy="-28" rx="2.5" ry="34" transform="rotate(16)"/>
    <ellipse cx="-11" cy="-38" rx="2.5" ry="30" transform="rotate(-14)"/>
    <ellipse cx="8" cy="-55" rx="2" ry="26" transform="rotate(10)"/>
    <ellipse cx="-16" cy="-48" rx="2" ry="24" transform="rotate(-20)"/>
    <ellipse cx="18" cy="-44" rx="2" ry="20" transform="rotate(24)"/>
    <line x1="0" y1="8" x2="0" y2="-62" stroke="#000" stroke-width="1.5"/>
  </g>
  <!-- Branch 6 - far right bottom -->
  <g transform="translate(750,600) rotate(-35)">
    <ellipse cx="0" cy="-36" rx="2.5" ry="34"/>
    <ellipse cx="10" cy="-48" rx="2" ry="28" transform="rotate(12)"/>
    <ellipse cx="-12" cy="-32" rx="2" ry="26" transform="rotate(-18)"/>
    <ellipse cx="14" cy="-28" rx="2" ry="22" transform="rotate(20)"/>
    <line x1="0" y1="5" x2="0" y2="-55" stroke="#000" stroke-width="1.5"/>
  </g>
  <!-- Scattered single thin leaves -->
  <ellipse cx="450" cy="150" rx="2" ry="30" transform="rotate(-30 450 150)"/>
  <ellipse cx="380" cy="280" rx="2.5" ry="28" transform="rotate(-45 380 280)"/>
  <ellipse cx="550" cy="250" rx="2" ry="32" transform="rotate(-20 550 250)"/>
  <ellipse cx="650" cy="120" rx="2" ry="26" transform="rotate(-55 650 120)"/>
  <ellipse cx="480" cy="420" rx="2.5" ry="30" transform="rotate(-15 480 420)"/>
  <ellipse cx="350" cy="500" rx="2" ry="24" transform="rotate(-40 350 500)"/>
  <ellipse cx="600" cy="500" rx="2" ry="28" transform="rotate(-25 600 500)"/>
  <ellipse cx="420" cy="620" rx="2.5" ry="26" transform="rotate(-35 420 620)"/>
  <!-- Thin stems -->
  <line x1="580" y1="80" x2="500" y2="550" stroke="#000" stroke-width="1.2"/>
  <line x1="700" y1="200" x2="720" y2="480" stroke="#000" stroke-width="1"/>
  <line x1="620" y1="350" x2="750" y2="600" stroke="#000" stroke-width="1"/>
</svg>
